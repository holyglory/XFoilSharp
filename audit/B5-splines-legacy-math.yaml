  total_files: 3
  total_methods_audited: 47
  parity_blockers: 0
  standard_blockers: 0
  notes: >-
    LegacyPrecisionMath is parity-only and clean — no allocations, no Console/IO, no locks,
    and all standard-branch call sites pass useLegacyPrecision=false either via literal or
    via settings-derived boolean (verified by grep across src/XFoil.Solver/Services:
    41 explicit ":true" occurrences all within parity-only paths; 8 ":false" occurrences;
    remainder propagate a settings variable whose default is false).

    ParametricSpline is largely correct vs spline.f (SPLINE/SPLIND/SEGSPL/SEVAL/DEVAL/
    SINVRT/SCALC mapping confirmed line-by-line). Main concerns:
      (1) Six public float[] overloads expose parity-single-precision API to standard-branch
          callers — S1 risk; should be internal or gated.
      (2) Per-call T[count] scratch arrays inside FitWithBoundaryConditionsCore and FitSegment.
      (3) Trace helpers build 20+ field anonymous objects per SEVAL/DEVAL; SolverTrace.IsActive
          guard is inside Event() and cannot suppress caller-side boxing. SEVAL/DEVAL are called
          from CosineClusteringPanelDistributor repanelling loops and LE-finder Newton iteration,
          making this a measurable allocation site even though it is not on the viscous Newton
          inner loop.
      (4) InvertSpline silently returns initial guess on failure; Fortran SINVRT writes to stdout.
          Minor behavioral divergence.

    CubicSpline is a duplicate of a subset of ParametricSpline functionality (natural-BC only,
    local Thomas solver). Used only by PanelMeshGenerator. Candidate for deletion/consolidation.
    Evaluate() clamps out-of-range input to endpoints, which diverges from Fortran SEVAL's
    polynomial extrapolation — deliberate managed choice, flag for S4 review.

    No parity or standard blockers in these three files. Cumulative effort to address all
    findings: roughly 1-2 engineer-days (mostly refactor + buffer pooling; correctness work
    minimal).
