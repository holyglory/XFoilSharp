  total_files: 2
  total_methods_audited: 17
  parity_blockers: 2
  standard_blockers: 5
  notes: |
    Parity branch: Main blocker is ComputePredictedEdgeVelocities heap allocation (known). Secondary concern is the Console.Error.WriteLine+Environment.GetEnvironmentVariable trace blocks remaining in ViscousNewtonAssembler (7+ sites) — even env-var-unset runs pay the dictionary/syscall cost per station.
    Standard branch: Trust-region path is structurally under-engineered. ComputeStepNorm drops |duedg|/0.25 component, DAC formula drops Mach sensitivity term, DCLMIN clamp is MATYP-locked, MirrorLowerWake precision suspect, and 5x .Clone() per iter. Combined these can easily account for the observed 1.8M% CD divergence on the standard branch; specifically the step norm omission and the Fortran CL_MS drop are the strongest suspects.
    P3 audit result: ViscousNewtonAssembler retains many Console.Error.WriteLine + env-var-gated trace blocks (at least 7 in BuildNewtonSystem plus 1 in ComputePredictedEdgeVelocities). ViscousNewtonUpdater has none. The "recent commits removed them" claim is PARTIALLY TRUE — updater is clean; assembler still has them.
    S4 Fortran diff: BuildNewtonSystem matches SETBL structurally; ApplyXFoilRelaxation matches UPDATE structurally. The subtle divergences are (a) DCLMIN MATYP-1 assumption, (b) missing CL_MS term in DAC, (c) ComputeStepNorm missing Ue term, (d) R2=1.0 TAU stub, (e) MirrorLowerWake unconditional RoundToSingle. None of these invalidate the parity-branch 100% bit-exact result on NACA Re/alpha sweeps, but they explain most of the standard-branch breakage.
