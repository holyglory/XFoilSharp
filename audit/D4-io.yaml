# Scope: /home/holyglory/XFoilSharp/src/XFoil.IO/ (28 files)
# Criteria run: X1 (TODO/FIXME/stubs) and P4 (file locks / concurrent-write hazards) only.
# P5 file I/O is expected in IO layer and is NOT flagged as violation; noted as write/read paths where relevant.
# All writers use File.WriteAllText / File.WriteAllLines on caller-supplied paths. No FileStream/FileShare/Mutex/lock primitives present.

agent: D4
