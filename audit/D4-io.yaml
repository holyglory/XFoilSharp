criteria_applied:
  - X1 (TODO/FIXME/stub markers)
  - P4 (concurrent-write hazards)
notes:
  - No lock/Mutex/Semaphore/Interlocked usage in any IO service.
  - All file writes use default File.WriteAllText / File.WriteAllLines (no explicit FileShare). Last-writer-wins if two writers target the same path.
  - Input path (outputDirectory, summaryPath, outputFileName) is entirely caller-controlled. No unique-path synthesis (no GUID / PID / timestamp suffix) in any exporter.
  - AnalysisSessionRunner is NOT thread-safe and does not document single-writer assumption, but executes sweeps serially in a single foreach loop, so the runner itself will not self-collide; collisions only arise across multiple concurrent Run() invocations.

