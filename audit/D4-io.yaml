# ---- Summary ----

summary:
  X1_stubs_todos:
    count: 2
    severity_breakdown: { low: 2, medium: 0, high: 0 }
    notes: "Both X1 hits are descriptive comments about the retired surrogate viscous pipeline in AnalysisSessionRunner (lines 237, 264). No code stubs, no TODO/FIXME markers, no NotImplementedException/NotSupportedException throws anywhere in XFoil.IO."
  P4_concurrent_write_hazards:
    count: 6
    severity_breakdown: { info: 3, medium: 3, high: 2 }
    systemic_pattern: |
      Every writer in XFoil.IO uses File.WriteAllText / File.WriteAllLines on a fully caller-controlled path, with no FileShare restriction, no atomic temp+rename, and no unique-path suffixing. This is safe so long as callers supply unique per-run paths. Two observed collision surfaces:
        1. AnalysisSessionRunner.Run writes a fixed "session-summary.json" inside outputDirectory. Two concurrent Run() calls pointed at the same outputDirectory collide deterministically on the summary plus every auto-named artifact (01-inviscid-alpha.csv, etc.).
        2. LegacyPolarDumpArchiveWriter.Export fans out 1 summary + 1 geometry + 2*N side CSVs under a common basePath derived from summaryPath. Two concurrent calls sharing summaryPath collide on every derived file.
    recommended_mitigations:
      - "Option A (doc-only): Add an xml-doc 'single-writer per path' contract to each Export method and to AnalysisSessionRunner.Run."
      - "Option B (API): Synthesize a per-run subdirectory (GUID or UTC-ticks) inside outputDirectory/summaryPath's parent before writing."
      - "Option C (atomicity): Write to <path>.tmp then File.Move(path, overwrite:true) so partial writes are never observable."
      - "Option D (fail-fast): Use new FileStream(path, FileMode.CreateNew, FileAccess.Write, FileShare.None) so the second concurrent writer fails loudly instead of silently overwriting."
  deliverable_status: complete
