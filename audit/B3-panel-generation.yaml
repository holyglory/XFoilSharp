    Panel-generation cluster is in relatively good shape for the parity branch.
    S1 priority check PASSED: ComputePanelAnglesLegacyFloat is correctly
    gated behind useLegacyPrecision and its single call site threads the
    flag from state.UseLegacyPanelingPrecision. Same pattern verified for
    ComputeNormalsCore<float>, ComputeTrailingEdgeGeometryCore<float>, and
    ContinuousAtan2 float overload.

    P1 priority check: the three TridiagonalSolver.Solve calls inside
    DistributeCore operate on already-allocated ww1/ww2/ww3/ww4 (reused
    across 20 Newton iterations) and SolveTridiagonalSegment internally
    allocates 4 segment scratch arrays. Distribute is invoked once per
    polar sweep (PolarSweepRunner, LinearVortexInviscidSolver) — not per
    alpha, not per Newton iteration — so internal allocations are
    per-analysis rather than hot-path. ArrayPool adoption in
    SolveTridiagonalSegment would eliminate the only remaining transient
    allocation but is not a P1 violation under the plan's definition.

    Standard-branch blocker: PanelMeshGenerator.Generate is an invented
    Gaussian-weighted mesh, NOT a PANGEN port (header comment makes this
    explicit). Any downstream code that uses PanelMeshGenerator in the
    non-parity branch inherits a different mesh than Fortran and cannot
    achieve parity. Likely contributes to the 1.8M% standard-branch CD
    divergence for runs that enter via AirfoilAnalysisService with the
    Hess-Smith default mesh path. Recommendation: replace with a thin
    wrapper over CosineClusteringPanelDistributor in a future phase.

    Secondary standard-branch finding: ComputeCompressibilityParameters
    uses M^2/(2(1+beta)) (Karman-Tsien/Laitone linearization form) while
    Fortran COMSET stores TKLAM = M^2/(1+beta)^2. Downstream Cp formula in
    LinearVortexInviscidSolver is algebraically consistent with the C#
    form, but the mapping comment cites COMSET which would produce a
    different numeric value for the same variable name. Needs a documented
    reconciliation. Also COMSET's sonic-condition outputs (CPSTAR, QSTAR)
    and Mach sensitivities (BETA_MSQ, TKL_MSQ) are simply absent on the
    managed path.

    No P3/P4/P5 violations in production hot paths. One P5 (StreamWriter)
    exists in Distribute but is env-var-gated (XFOIL_DUMP_PANELS).
