  notes: |
    LinearVortexInviscidSolver parity branch is clean — all float narrowings verified gated by
    UseLegacyKernelPrecision or UseLegacyPanelingPrecision. Single-precision LU copies at lines
    53, 379 are parity-only. Standard branch has a hard-coded clMach2=0 (dead CL_MSQ) and lacks
    SPECAL's inner CLM/Mach Newton loop, so compressible sweeps cannot converge on the standard
    path.

    HessSmithInviscidSolver is NOT a port (documented at class level) — standard branch uses a
    classical Hess-Smith kernel with per-panel constant Cp integration and a camber-based lift-
    sign heuristic. Likely dominant contributor to the 1.8M% CD error on standard branch.

    Parity allocations: no hot-path allocations. Prepare() allocates once per mesh; Analyze
    allocates per-alpha but outside the Newton inner loop. SolverTrace anonymous objects are
    IsActive-gated (P6 concern only when tracing enabled during benchmarks).

    Dead code: cpM2 array (LinearVortex:875), FormatSingleHex helper (LinearVortex:362).
