ledger_summary:
  total_files: 1
  total_methods_audited: 18
  parity_blockers: 0
  standard_blockers: 0
  notes: |
    File has two kernels:
      (1) ComputeInfluenceAt - pure double, used as the standard branch.
      (2) ComputeInfluenceAtLegacyPrecision - deliberate float REAL replay for bit-exact gfortran parity.
    The double path is free of float/MathF/float-literal leaks (S1/S2/S3 clean).
    The legacy-precision path is intentionally float-heavy and must remain that way
    until parity can be proven without the replay.

    Key parity concerns (P1/P3/P6): 4 float[] allocations per call in the legacy path,
    plus unconditional anon-object + interpolated-string allocations per call in BOTH paths
    via SolverTrace.Scope and ScopeName. On 160-panel/40-wake problems this is
    tens of thousands of small allocations per Newton iteration. Would show as GC
    pressure in sustained polar sweeps but not as a parity-breaking bug.

    Standard-branch audit is clean on S1/S2/S3 - no float leaks in the double path.
    The main S4 concern is missing GEOLIN (DZDN) and the cosmetic flat-vs-staged
    expression inconsistency that becomes FMA-sensitive when -ffp-contract differs
    between JIT and the Fortran reference.

    The 25000-vector NACA sweep has validated the parity path to bit-exactness.
    The file is production-ready for the parity branch and only minor for standard,
    with the caveat that the 1.8M% CD error in the standard branch is NOT rooted
    in this kernel (PSILIN outputs look correct; the bug is downstream).
