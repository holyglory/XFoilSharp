notes: |
  Tier-A solo audit of src/XFoil.Solver/Services/ViscousSolverEngine.cs (8953 lines).
  Four-pass methodology (method index -> P1-P6 alloc/IO/locks -> S1-S3,S6 precision ->
  S4/S5/S7/S8/X1/X2/X3 correctness+modernization).
  The file contains ~70 methods (plus 2 nested types + 1 record struct + constants);
  the plan's "109-method" figure over-counts — actual physical method declarations
  enumerated below. Every method is covered. Shown line ranges are declaration-start
  to body-end (inclusive). The file has NO lock/Task/async/Parallel/File.*/Stream.*/
  Path.*/Directory.* activity (verified by grep); only [ThreadStatic] fields for
  private counters, which are benign. Heaviest P-branch findings are per-Newton-iter
  Console.Error writes gated by env vars and per-iter `new List<ViscousConvergenceInfo>()`
  allocations plus `new double[]` for every call of BuildViscousPanelSpeeds /
  ConvertUedgToSpeeds / BuildWakeGapArray / ComputeViscousCL / ComputeViscousCM.
  Heaviest S-branch findings are (a) the managed-surrogate Thwaites downstream
  formula at lines 2923-2939 and the post-Thwaites CTAU=0.03 seed at 3157-3168
  which are both invoked when UseLegacyBoundaryLayerInitialization is FALSE,
  (b) the entire MarchBoundaryLayer / MarchResidual / UpdateEdgeVelocityDIJCoupling
  helpers are dead code (never called anywhere in this file or elsewhere — see
  Grep), (c) EstimateDrag uses an ad-hoc fallback Squire-Young at a TE proxy
  station, not at the wake end — only used in per-iter convergence history but
  still diverges from VISCAL's DRAGFIX wake-end integration.

