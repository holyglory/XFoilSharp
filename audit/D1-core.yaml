  total_files: 10
  total_methods_audited: 30
  parity_blockers: 0
  standard_blockers: 0
  notes: |
    D1 (XFoil.Core) is outside the solver hot path; no P or S blockers found.

    Priority focus results:

    (1) LegacyLibm standard-branch leakage check: VERIFIED CLEAN.
        A repo-wide grep for `LegacyLibm\.` returned callers in 10 source files;
        every single one is either (a) inside `typeof(T)==typeof(float)` generic
        guard, (b) inside an explicit `useLegacyPrecision ? LegacyLibm.X : Math.X`
        ternary, or (c) inside a dedicated `*Legacy*Float*` / `*LegacyFloat*`
        method that is only dispatched from the parity branch. No standard
        (double-precision) caller. LegacyLibm discipline is intact.

    (2) Airfoil parser/generator zero-GC opportunities:
        AirfoilParser pipes every file through List<string>/LINQ; a zero-GC
        rewrite would save ~5 allocations per file but this is a one-shot
        preprocessing step, not a hot path — effort vs. value is weak.
        NacaAirfoilGenerator similarly uses List<AirfoilPoint> + LINQ assembly;
        preallocated AirfoilPoint[pointCount] would be a 1-hour cleanup.

    Recommendations (non-binding — fix phase only):
      - Tighten AirfoilParser / NacaAirfoilGenerator allocations to arrays.
      - Round out LegacyLibm Sin/Cos on Mac + Windows for off-Linux parity.
      - Add NACA5 / NACA4-modified to the generator (S8 modernization).

    Core is a stable periphery. Recommend skipping D1 files in any aggressive
    parity-branch perf pass; focus perf/allocation work on Solver tier (A/B/C).
