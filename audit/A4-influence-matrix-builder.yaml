    file_summary:
      parity_verdict: minor
      standard_verdict: minor
      top_findings:
        - "S7: Wake length is hardcoded at Math.Max(chord, ds1). Fortran XYWAKE uses WAKLEN*CHORD with WAKLEN being a user-settable variable (default 1.0). Managed port has no equivalent knob. Long-wake support (post-stall 2-5 chord, low-Re 5-10 chord) requires parameterizing via AnalysisSettings.WakeLengthRatio."
        - "S7: Wake station count (nWake) is passed in from the caller with no internal cap. Fortran caps at IWX (compile-time). For 100+ station wakes, allocations in FillAnalyticalWakeCoupling (wakeSurfaceInfluence[n,nWake]) and per-row scratch grow linearly; verify SolverBuffers can absorb."
        - "S7: EstimateFirstWakeSpacing parity branch uses 0.5*UPPERDELTA instead of Fortran's 0.5*(UPPER+LOWER). Empirically equivalent when LOWERDELTA~=0 (collapsed TE), but would diverge on blunt/rounded TE airfoils."
        - "S1/S2 parity gating CORRECT: all float paths (BackSubstituteAirfoilColumn, BackSubstituteWakeColumn, ComputeWakeSourceSensitivitiesAtCoreSingle, legacyWakeRow accumulation in FillAnalyticalWakeCoupling, LegacySingleLength/WideProductSum/etc.) are gated by inviscidState.UseLegacyKernelPrecision or useLegacyWakeSourceKernelPrecision. Verified — no leakage into standard branch."
        - "P1 allocations per wake-geometry build: 5 ToDoubleArray conversions plus 5 T[] source arrays per BuildWakeGeometryCore call; per-field-point new float[nWake]/new T[nWake] in PSWLIN kernels; per-wake-row new double[n] cijRow + airfoilSourceRow in FillAnalyticalWakeCoupling. Called once per viscous solve (~O(N+NW) allocations per sweep point), acceptable for polar sweeps but should be pooled via SolverBuffers for tight warm-start loops."
        - "S4 correctness: wake-row CIJ*DIJ accumulation (lines 607-643) condenses Fortran's two-pass loops 70+80 into one. Semantics preserved (verified). Sharp-TE gate (line 474 rhs[n-1]=0) correctly mirrors xpanel.f:2019 DO 34 J SHARP branch."
        - "S5 correctness: 1/(x1-x0) and 1/(x0-x2) divisions (lines 980, 1276, 1752, 1893) have no epsilon guard; the algorithm assumes non-degenerate wake panels. Long-wake / coarse-step configurations may hit near-collinearity. Fortran has the same unguarded division."
        - "X1: Hard-coded hex patch at line 1046 (BD971D0F) for alpha=-10 sourceIndex=8 parity fix. Parity-branch only. Keep as-is; add a TODO to replicate the underlying REAL rounding generically."
        - "X2: FillWakeApproximation (line 349) is a heuristic decay fallback that has no Fortran analogue; only reachable from BuildNumericalDIJ. Safe (validation path) but document as debug-only to prevent accidental solver routing."
      estimated_fix_effort: "3-5 days for S7 wake parameterization (AnalysisSettings.WakeLengthRatio + WakeStationCount with defaults preserving current behavior; propagate through ViscousSolverEngine and PolarSweepRunner); 1 day for per-wake-row scratch pooling via SolverBuffers; 0.5 day to document/gate FillWakeApproximation."
ledger_summary:
  total_files: 1
  total_methods_audited: 28
  parity_blockers: 0
  standard_blockers: 0
  notes: >-
    InfluenceMatrixBuilder is called once per viscous solve (verified: single
    call site in ViscousSolverEngine.cs:1847; no per-iteration invocation).
    Per-sweep allocations dominate; BackSubstituteAirfoilColumn and
    BackSubstituteWakeColumn allocate float[] scratch per column (N+NW per
    sweep) on the parity path — minor GC pressure. The PSWLIN kernels
    (CoreSingle and Core<T>) each allocate 2 x nWake arrays per field-point
    call, giving O((N+NW)*nWake) doubles per sweep; acceptable at 80x25 but
    grows quadratically with wake length.

    No per-Newton-iteration allocations identified. No I/O, locks, or async
    calls on hot path. SolverTrace.Event calls use anonymous objects (closure
    allocations), but all are gated by SolverTrace.IsActive — verified.

    Standard-branch correctness verdict: MINOR. The analytical DIJ path is
    a faithful QDCALC port. The main gaps are feature-parity with Fortran's
    user-configurable wake length (WAKLEN), and the numerical-DIJ path's
    heuristic wake fallback (FillWakeApproximation) which should either be
    upgraded to share the analytical wake-row assembly or explicitly
    restricted to debug/validation use.

    Parity branch is covered by careful float gating and documented
    hex-level patches (line 1046); the legacy state is mature and should not
    be touched without GDB-verified motivation.

    Key S7 recommendation: add AnalysisSettings.WakeLengthRatio (default 1.0
    to preserve behavior) + AnalysisSettings.WakeStationCount (override for
    the Fortran N/8+2 default) so long-wake regimes become first-class.
    These are prerequisites for robust post-stall and low-Re analysis.
