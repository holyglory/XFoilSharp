            state.LegacyStreamfunctionInfluenceFactors gated by
            state.UseLegacyKernelPrecision.
          - BlockTridiagonalSolver.Solve float path gated by
            useLegacyPrecision parameter.
        NO standard-branch leak detected.

    (5) SolverBuffers confirmed as the sole parity-branch allocation solution;
