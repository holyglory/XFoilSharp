        allocates 4-5 float[,,] per Newton iteration (CopyToSingle for
        VA/VB/VM/VDEL/VZ). VM is nsys*nsys*3 floats - largest GC pressure
        site in Numerics. P1 violation under parity-path allocation audit.
        Proposed fix: hoist parity float scratch into
        ViscousNewtonSystem-owned buffers, same lifetime as VA/VB/VM.

    (3) SolverTrace.Scope / SolverTrace.Event + anonymous record patterns in
        BlockTridiagonalSolver and TridiagonalSolver allocate unconditionally
        before reaching the trace sink's null check. P6 violation. Contrast
        with ScaledPivotLuSolver which properly guards
        'if (traceContext is null || SolverTrace.Current is null) return;'
        BEFORE constructing the anonymous object. The LU solver pattern
        should be copied to the other two.

