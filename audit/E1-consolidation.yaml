    evidence_lines:
      - "A1: line 908 top-finding; line 815-816 RecomputeWakeGap MathF.Sqrt"
      - "A2: lines 506 top-finding, 527 note"
      - "B1: line 650 top-finding"
      - "A6: line 86 (bit-pattern hack)"
      - "B5: line 333 top-finding"
