  - cluster_id: RC6
    title: "Panel-mesh fabricated instead of ported"
    severity: high
    hypothesis: |
      PanelMeshGenerator is documented as 'not a PANGEN port'. Every
      standard-branch inviscid/viscous solve that routes through this
      builder meshes the airfoil with a managed heuristic
      (Gaussian curvature clustering, sigma=0.06). Disagreement with
