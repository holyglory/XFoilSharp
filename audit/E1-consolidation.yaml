# 3. ROOT-CAUSE CLUSTERS (standard-branch)
# ----------------------------------------------------------------------------
root_cause_clusters:

  - cluster_id: RC1
    title: "Compressibility (Mach) sensitivity dropped across BL + inviscid"
    severity: critical
    hypothesis: |
      The standard (double-precision) branch silently assumes M=0 in multiple
      independent locations. Any sweep at M>0 therefore cannot converge a
      compressible Newton; residual sensitivity columns are zero, so the
      solver wanders in a physically wrong direction. This cluster is the
      single most plausible contributor to the 1.8M% CD error on compressible
      test cases.
    affected_files:
      - src/XFoil.Solver/Services/BoundaryLayerSystemAssembler.cs
      - src/XFoil.Solver/Services/ViscousNewtonAssembler.cs
      - src/XFoil.Solver/Services/ViscousNewtonUpdater.cs
      - src/XFoil.Solver/Services/LinearVortexInviscidSolver.cs
      - src/XFoil.Solver/Services/ViscousSolverEngine.cs
      - src/XFoil.Solver/Services/PanelGeometryBuilder.cs
    affected_methods:
      - "BoundaryLayerSystemAssembler.AssembleStationSystem (VSM/VSR chain)"
      - "BoundaryLayerSystemAssembler.ComputeFiniteDifferences (VSM drop in BldifResult)"
      - "ViscousNewtonUpdater.ComputeDacFromClDrift (missing CL_MS*MS_AC)"
      - "ViscousNewtonAssembler at line 986 (R2=1.0 stub)"
      - "LinearVortexInviscidSolver.IntegratePressureForces (clMach2=0)"
      - "LinearVortexInviscidSolver.SolveAtAngleOfAttack (no SPECAL Mach loop)"
      - "ViscousSolverEngine.ComputeViscousCL (no Karman–Tsien)"
      - "PanelGeometryBuilder.ComputeCompressibilityParameters (missing CPSTAR/QSTAR, BETA_MSQ, TKL_MSQ)"
    fortran_references:
      - "f_xfoil/src/xblsys.f:3207-3900 (BLDIF VSM/VSR)"
      - "f_xfoil/src/xblsys.f:647-658 (BLSYS VSM chain transform)"
      - "f_xfoil/src/xbl.f:4430 (UPDATE DAC formula)"
      - "f_xfoil/src/xfoil.f:1024 (COMSET constants)"
      - "f_xfoil/src/xfoil.f:1168 (CLCALC CL_MSQ)"
      - "f_xfoil/src/xoper.f:2458-2502 (SPECAL inner Mach/CLM loop)"
    evidence_lines:
      - "A2: line 178 (BLDIF VSM drop) — critical"
      - "A2: line 335 (BLSYS VSM chain) — critical; line 505 top-finding"
      - "B1: line 492 (DAC CL_MS drop), line 646 top-finding; line 107 R2=1.0 stub"
      - "B2: line 215 (IntegratePressureForces clMach2=0) — critical"
      - "B2: line 162 (SolveAtAngleOfAttack Mach Newton skip)"
      - "A1: line 1603 (ComputeViscousCL Karman–Tsien missing) — top-finding"
      - "B3: line 594 (ComputeCompressibilityParameters outputs)"
    hypothesized_cd_impact: |
      Dominant at M>0.3. For M≈0 cases this cluster contributes little or
      nothing; however, several inviscid/viscid couplings (CL drift, SPECAL
      convergence) can still misbehave even at low M if MS_AC is non-zero
      during Re-sweep transitions.

  - cluster_id: RC2
    title: "BL seed not re-marched: standard branch enters Newton on raw Thwaites"
    severity: critical
    hypothesis: |
      Fortran SETBL always MRCHDUs the BL state inside its station loop before
      Newton assembly. The C# standard branch only calls
      RemarchBoundaryLayerLegacyDirect inside the legacy-gated branch; the
      non-legacy path feeds the Newton solver a raw Thwaites-predictor seed
      plus hardcoded turbulent/wake patches. This is structural, not
      tuneable.
    affected_files:
      - src/XFoil.Solver/Services/ViscousSolverEngine.cs
    affected_methods:
      - "ViscousSolverEngine.PreparePreNewtonSetupFromInviscid (line 1798)"
      - "ViscousSolverEngine.InitializeBLThwaitesXFoil (lines 2923-3168)"
    fortran_references:
      - "f_xfoil/src/xbl.f:21 SETBL (the per-iteration MRCHDU inside SETBL)"
      - "f_xfoil/src/xbl.f:1245 MRCHUE (full Newton per laminar station)"
    evidence_lines:
      - "A1: line 181 (SolveViscousFromInviscid:447 comment)"
      - "A1: line 389 (PreparePreNewtonSetupFromInviscid:1798 — critical)"
      - "A1: line 567 (InitializeBLThwaitesXFoil:2923 — critical)"
      - "A1: line 569-571 (hardcoded CTAU=0.03 + frozen-theta wake — high)"
    hypothesized_cd_impact: |
      Dominant at any regime. A wrong BL seed at every station is arguably
      the single likeliest explanation for 1.8M% relative CD error on
      M=0 cases. RC1 and RC2 together explain most standard-branch failures.

  - cluster_id: RC3
    title: "Wake physics mis-formulated on standard branch"
    severity: high
    hypothesis: |
      Three independent wake errors compound: (a) hand-rolled hardcoded
      CTAU=0.03 wake seed; (b) frozen-theta march through the wake;
      (c) DWDXTE derivative taken from the wake-segment tangent instead of
      the airfoil TE cross-product; (d) post-STMOVE refresh of WGAP /
      SST_GO restricted to legacy path.
    affected_files:
      - src/XFoil.Solver/Services/ViscousSolverEngine.cs
      - src/XFoil.Solver/Services/WakeGapProfile.cs
      - src/XFoil.Solver/Services/WakeGeometryGenerator.cs
    affected_methods:
      - "ViscousSolverEngine.InitializeBLThwaitesXFoil (wake seed CTAU=0.03)"
      - "ViscousSolverEngine.BuildWakeGapProfile (DWDXTE formula divergence)"
      - "ViscousSolverEngine.RecomputeWakeGapFromXssi (legacy-gated only)"
      - "WakeGeometryGenerator.Generate (hard-coded wakeCount + WakeLengthRatio=1.0)"
    fortran_references:
      - "f_xfoil/src/xblsys.f CTBAR/CTEQ"
      - "f_xfoil/src/xbl.f MRCHUE wake loop"
      - "f_xfoil/src/xpanel.f:2472 XICALC (DWDXTE + WGAP recompute)"
    evidence_lines:
      - "A1: line 569, 570, 571, 514, 187 (all high)"
      - "A1: line 797, 806 (post-STMOVE refresh legacy-only)"
      - "C1: line 699, 700 (hard-coded wakeCount and WakeLengthRatio=1.0)"
      - "A4: line 323 (same S7 finding on WAKLEN)"
    hypothesized_cd_impact: |
      High at any regime, particularly post-stall and low-Re where wake
      shear dominates skin-friction CD.

  - cluster_id: RC4
    title: "Newton updater drops/under-weights terms"
    severity: high
    hypothesis: |
      Newton update machinery for the standard branch differs from
      Fortran UPDATE: DAC formula drops CL_MS*MS_AC; DCLMIN hard-codes
      MATYP=1; StepNorm omits the |duedg|/0.25 term that XFoilRelaxation
      includes; trust-region scalar shrink replaces per-variable DHI/DLO;
      convergence check masks NaN rmsbl with double.MaxValue and keeps
      iterating.
    affected_files:
      - src/XFoil.Solver/Services/ViscousNewtonUpdater.cs
      - src/XFoil.Solver/Services/ViscousSolverEngine.cs
    affected_methods:
      - "ViscousNewtonUpdater.ComputeDacFromClDrift (CL_MS drop)"
      - "ViscousNewtonUpdater.ApplyXFoilRelaxation (DCLMIN MATYP lock)"
      - "ViscousNewtonUpdater.ComputeStepNorm (Ue term missing)"
      - "ViscousNewtonUpdater.ApplyTrustRegionUpdate (trust-region theory violations)"
      - "ViscousSolverEngine.SolveViscousFromInviscid (rlx=0 NaN masking at line 603/847)"
    fortran_references:
      - "f_xfoil/src/xbl.f:4247 (DCLMIN)"
      - "f_xfoil/src/xbl.f:4430 (DAC formula)"
      - "f_xfoil/src/xbl.f:4486 (RMSBL + UPDATE)"
    evidence_lines:
      - "B1: lines 316-317, 488-497, 572-596, 648-649"
      - "A1: lines 172-174 (rlx=0, rmsbl=MaxValue masking)"
    hypothesized_cd_impact: |
      Compounds RC1 + RC2. Even if BL seed were correct, a broken Newton
      updater will walk to a non-physical fixed point under NaN masking.

  - cluster_id: RC5
    title: "Precision narrowing in non-legacy paths (silent float rounds)"
    severity: medium
    hypothesis: |
      Handful of methods narrow double to float or call MathF.* without
      a useLegacyPrecision gate. These degrade the standard branch to
      single-precision semantics in small localized regions.
    affected_files:
      - src/XFoil.Solver/Services/ViscousSolverEngine.cs
      - src/XFoil.Solver/Services/BoundaryLayerSystemAssembler.cs
      - src/XFoil.Solver/Services/ViscousNewtonUpdater.cs
      - src/XFoil.Solver/Services/BoundaryLayerCorrelations.cs
      - src/XFoil.Solver/Numerics/ParametricSpline.cs
    affected_methods:
      - "ViscousSolverEngine.ComputeSeedStepMetrics (MathF.Sqrt on double arg — line 8495)"
      - "ViscousSolverEngine.RecomputeWakeGapFromXssi (float locals/MathF.Sqrt — legacy-gated callers only, but method body leaks precision if reused)"
      - "BoundaryLayerSystemAssembler.ComputeStationVariables (unconditional float for US/Cteq/DI/DE — lines 310-452)"
      - "ViscousNewtonUpdater.MirrorLowerWakeOntoUpperWake (unconditional RoundToSingle)"
      - "BoundaryLayerCorrelations: bit-pattern hack in ComputeBldifLogTerms line 6749"
      - "ParametricSpline: six public float[] overloads without parity gating"
