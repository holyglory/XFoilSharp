  XFoil.Design is an offline, per-request design-tooling assembly (MAPGEN, flap deflection,
  QSpec inverse design, contour edits, LE-radius edits, modal inverse design). None of these
  services are invoked from the solver sweep hot path (ViscousSolverEngine / PolarSweepRunner /
  BoundaryLayerSystemAssembler / TransitionModel). Grepped the entire XFoil.Design tree for
  references to AirfoilAnalysisService, PolarSweepRunner, ViscousSolverEngine — zero matches.
  Per assignment, ran only the reduced P1/P4/P5/X1 checks. S-family (float/MathF/correctness/
  modernization) and X2/X3 are explicitly out of scope for this tier.

